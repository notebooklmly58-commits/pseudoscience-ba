<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pseudoscience QBank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============ design tokens ============ */
  :root{
    --bg:#0b0908;
    --bg-deep:#050403;
    --panel:#14100a;
    --panel-2:#1b150d;
    --gold:#b8923f;
    --gold-bright:#e0bd6d;
    --gold-dim:#6e5726;
    --oxblood:#6b1620;
    --oxblood-bright:#9c2735;
    --sapphire:#33507a;
    --parchment:#ece4cf;
    --text-dim:#a89a7c;
    --danger:#c0394a;
    --ok:#4a8f5c;
    --radius:6px;
    --font-display:'Cinzel Decorative', serif;
    --font-head:'Cinzel', serif;
    --font-body:'Cairo', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, rgba(107,22,32,.25), transparent 60%),
      radial-gradient(ellipse at 100% 100%, rgba(51,80,122,.12), transparent 55%),
      var(--bg-deep);
    color:var(--parchment);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  ::selection{background:var(--gold-dim);color:#fff;}

  /* ============ layout shell ============ */
  #app{max-width:720px;margin:0 auto;min-height:100vh;padding:20px 16px 60px;position:relative;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .brandmini{font-family:var(--font-head);font-size:14px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}
  .gearBtn{
    background:transparent;border:1px solid var(--gold-dim);color:var(--text-dim);
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:15px;transition:.2s;
  }
  .gearBtn:hover{border-color:var(--gold);color:var(--gold-bright);}

  /* ============ ornate divider (signature element) ============ */
  .divider{display:flex;align-items:center;gap:10px;margin:22px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-dim) 40%, var(--gold-dim) 60%, transparent);}
  .divider .gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);
    box-shadow:0 0 10px 1px rgba(184,146,63,.7);flex:none;}

  /* ============ hero / emblem ============ */
  .hero{text-align:center;padding:26px 10px 8px;}
  .emblem{width:78px;height:78px;margin:0 auto 14px;position:relative;}
  .emblem svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(184,146,63,.35));}
  .wordmark{
    font-family:var(--font-display);
    font-size:30px;color:var(--oxblood-bright);
    text-shadow:0 0 18px rgba(156,39,53,.45), 0 1px 0 rgba(0,0,0,.6);
    letter-spacing:.02em;
  }
  .subtitle{font-family:var(--font-head);font-size:12.5px;letter-spacing:.18em;color:var(--text-dim);
    text-transform:uppercase;margin-top:6px;}

  /* ============ breadcrumb ============ */
  .crumbs{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px;color:var(--text-dim);margin-bottom:14px;min-height:20px;}
  .crumbs button{background:none;border:none;color:var(--gold-bright);font-size:13px;padding:0;}
  .crumbs button:hover{text-decoration:underline;}
  .crumbs .sep{color:var(--gold-dim);}

  /* ============ ledger cards ============ */
  .ledger{display:flex;flex-direction:column;gap:10px;}
  .plaque{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--gold-dim);
    border-radius:var(--radius);
    padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    transition:.18s ease;
  }
  .plaque.clickable{cursor:pointer;}
  .plaque.clickable:hover{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-dim), 0 6px 18px -8px rgba(184,146,63,.35);transform:translateY(-1px);}
  .plaque .label{font-weight:700;font-size:15.5px;color:var(--parchment);}
  .plaque .meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .plaque .chev{color:var(--gold-dim);font-size:18px;}

  .emptyState{text-align:center;padding:40px 16px;color:var(--text-dim);font-size:14px;line-height:1.9;}

  /* ============ buttons ============ */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 20px;border-radius:var(--radius);font-weight:700;font-size:14.5px;
    border:1px solid var(--gold-dim);background:transparent;color:var(--gold-bright);
    transition:.18s;
  }
  .btn:hover{border-color:var(--gold);background:rgba(184,146,63,.08);}
  .btn.primary{background:linear-gradient(180deg, var(--oxblood-bright), var(--oxblood));border-color:var(--oxblood-bright);color:#fff;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.gold{background:linear-gradient(180deg, var(--gold-bright), var(--gold));border-color:var(--gold-bright);color:#1a1206;}
  .btn.ghost{border-color:transparent;color:var(--text-dim);}
  .btn.danger{border-color:var(--danger);color:var(--danger);}
  .btn.danger:hover{background:rgba(192,57,74,.1);}
  .btn.block{width:100%;}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .startBar{margin-top:8px;padding:16px;border:1px dashed var(--gold-dim);border-radius:var(--radius);
    display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(184,146,63,.04);}
  .startBar .count{font-size:13px;color:var(--text-dim);}

  /* ============ quiz ============ */
  .quizHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .progressWrap{flex:1;height:6px;background:var(--panel-2);border-radius:6px;margin:0 14px;overflow:hidden;border:1px solid var(--gold-dim);}
  .progressBar{height:100%;background:linear-gradient(90deg, var(--gold-dim), var(--gold-bright));transition:.3s;}
  .qCounter{font-family:var(--font-head);font-size:13px;color:var(--gold);white-space:nowrap;}

  .questionCard{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--gold-dim);border-radius:var(--radius);
    padding:22px 18px;margin-bottom:16px;
  }
  .questionText{font-size:17px;font-weight:700;line-height:1.8;color:var(--parchment);}

  .options{display:flex;flex-direction:column;gap:10px;}
  .optionBtn{
    text-align:right;padding:13px 16px;border-radius:var(--radius);
    border:1px solid var(--gold-dim);background:var(--panel-2);color:var(--parchment);
    font-size:14.5px;line-height:1.6;transition:.15s;
  }
  .optionBtn:hover:not(:disabled){border-color:var(--gold);}
  .optionBtn.correct{border-color:var(--ok);background:rgba(74,143,92,.15);color:#c9f0d1;}
  .optionBtn.wrong{border-color:var(--danger);background:rgba(192,57,74,.15);color:#f5c3ca;}
  .optionBtn:disabled{cursor:default;}

  .explainBox{margin-top:14px;padding:12px 14px;border-radius:var(--radius);background:rgba(51,80,122,.12);
    border:1px solid var(--sapphire);font-size:13.5px;color:#c7d5ea;line-height:1.8;}

  .quizFooter{display:flex;justify-content:flex-end;margin-top:6px;}

  /* ============ results ============ */
  .resultHero{text-align:center;padding:20px 10px;}
  .scoreRing{font-family:var(--font-head);font-size:44px;color:var(--gold-bright);font-weight:700;}
  .scoreLabel{color:var(--text-dim);font-size:13px;margin-top:4px;}
  .wrongList{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .wrongItem{border:1px solid var(--danger);border-radius:var(--radius);padding:12px 14px;background:rgba(192,57,74,.07);}
  .wrongItem .qt{font-weight:700;font-size:14px;margin-bottom:8px;}
  .wrongItem .ans{font-size:13px;color:#c9f0d1;}
  .resultActions{display:flex;gap:10px;margin-top:20px;}

  /* ============ forms / admin ============ */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  .field input[type=text],.field input[type=email],.field input[type=password],.field select,.field textarea{
    width:100%;padding:11px 12px;border-radius:var(--radius);border:1px solid var(--gold-dim);
    background:var(--panel-2);color:var(--parchment);font-size:14px;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold-dim);border-color:var(--gold);}
  .field textarea{min-height:160px;resize:vertical;font-family:'Courier New',monospace;font-size:13.5px;line-height:1.6;}

  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--gold-dim);}
  .tabBtn{background:none;border:none;padding:10px 14px;color:var(--text-dim);font-weight:700;font-size:13.5px;
    border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tabBtn.active{color:var(--gold-bright);border-color:var(--gold-bright);}

  .treeNode{margin-inline-start:0;}
  .treeRow{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--gold-dim);
    border-radius:var(--radius);background:var(--panel-2);margin-bottom:6px;}
  .treeRow .name{flex:1;font-size:14px;font-weight:600;}
  .treeChildren{margin-inline-start:22px;border-inline-start:1px dashed var(--gold-dim);padding-inline-start:12px;}
  .iconBtn{background:none;border:none;color:var(--text-dim);font-size:14px;padding:4px 6px;border-radius:4px;}
  .iconBtn:hover{color:var(--gold-bright);background:rgba(184,146,63,.1);}
  .iconBtn.danger:hover{color:var(--danger);}

  .previewCard{border:1px solid var(--gold-dim);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;background:var(--panel-2);}
  .previewCard .qn{font-weight:700;font-size:13.5px;margin-bottom:6px;}
  .previewCard .op{font-size:12.5px;color:var(--text-dim);padding:2px 0;}
  .previewCard .op.correct{color:var(--ok);font-weight:700;}
  .previewCard .rm{float:left;}

  .notice{padding:12px 14px;border-radius:var(--radius);font-size:13.5px;margin-bottom:14px;}
  .notice.err{background:rgba(192,57,74,.12);border:1px solid var(--danger);color:#f5c3ca;}
  .notice.ok{background:rgba(74,143,92,.12);border:1px solid var(--ok);color:#c9f0d1;}
  .notice.info{background:rgba(51,80,122,.12);border:1px solid var(--sapphire);color:#c7d5ea;}

  .loadingDots{text-align:center;color:var(--text-dim);padding:40px 0;font-size:13px;letter-spacing:.1em;}

  .footNote{text-align:center;font-size:11px;color:var(--gold-dim);margin-top:30px;letter-spacing:.08em;}

  @media (max-width:420px){
    .wordmark{font-size:24px;}
    .questionText{font-size:15.5px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════════════════════
   شريط تشخيص الأخطاء المرئي — يظهر أي خطأ برمجي أو خطأ من Supabase
   مباشرة على الشاشة (مفيد جداً لأن لا يوجد وصول لأدوات المطوّر على الموبايل)
   ══════════════════════════════════════════════════════════════════ */
window.__debugLogs = [];

function ensureDebugPanel(){
  let wrap = document.getElementById('debugWrap');
  if(wrap) return wrap;

  wrap = document.createElement('div');
  wrap.id = 'debugWrap';
  wrap.style.cssText = 'position:fixed;bottom:14px;left:14px;z-index:99999;direction:ltr;font-family:monospace;';

  const toggle = document.createElement('button');
  toggle.id = 'debugToggle';
  toggle.type = 'button';
  toggle.style.cssText = 'width:38px;height:38px;border-radius:50%;border:1px solid #9c2735;background:#3a0000;color:#fff;font-size:15px;line-height:1;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.5);position:relative;';
  toggle.textContent = '⚠';
  const badge = document.createElement('span');
  badge.id = 'debugCount';
  badge.style.cssText = 'position:absolute;top:-6px;right:-6px;background:#c0394a;color:#fff;border-radius:10px;min-width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 3px;';
  badge.textContent = '0';
  toggle.appendChild(badge);

  const panel = document.createElement('div');
  panel.id = 'debugPanel';
  panel.style.cssText = 'display:none;position:fixed;bottom:60px;left:14px;right:14px;max-width:460px;max-height:42vh;overflow:auto;background:#2a0000;color:#fff;font-size:11px;line-height:1.5;border:1px solid #9c2735;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.6);';

  const header = document.createElement('div');
  header.style.cssText = 'position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;background:#3a0000;padding:8px 10px;border-bottom:1px solid #660000;';
  header.innerHTML = '<span style="font-weight:bold;">سجل الأخطاء (أدمن)</span>';
  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:6px;';
  const clearBtn = document.createElement('button');
  clearBtn.type = 'button'; clearBtn.textContent = 'مسح';
  clearBtn.style.cssText = 'background:none;border:1px solid #9c2735;color:#fff;border-radius:4px;font-size:10px;padding:3px 8px;cursor:pointer;';
  clearBtn.onclick = () => { window.__debugLogs = []; renderDebugLines(); updateDebugBadge(); };
  const closeBtn = document.createElement('button');
  closeBtn.type = 'button'; closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:none;border:1px solid #9c2735;color:#fff;border-radius:4px;font-size:10px;padding:3px 8px;cursor:pointer;';
  closeBtn.onclick = () => { panel.style.display = 'none'; };
  btns.appendChild(clearBtn); btns.appendChild(closeBtn);
  header.appendChild(btns);

  const lines = document.createElement('div');
  lines.id = 'debugLines';
  lines.style.cssText = 'padding:8px;';

  panel.appendChild(header);
  panel.appendChild(lines);

  toggle.onclick = () => {
    panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
  };

  wrap.appendChild(panel);
  wrap.appendChild(toggle);
  (document.body || document.documentElement).appendChild(wrap);
  return wrap;
}

function updateDebugBadge(){
  const badge = document.getElementById('debugCount');
  if(badge) badge.textContent = String(window.__debugLogs.length);
}

function renderDebugLines(){
  const lines = document.getElementById('debugLines');
  if(!lines) return;
  lines.innerHTML = window.__debugLogs.map(m =>
    `<div style="border-bottom:1px solid #660000;padding:5px 0;white-space:pre-wrap;word-break:break-word;">⚠ ${m.time} — ${m.msg}</div>`
  ).join('') || '<div style="color:#c9a; padding:6px 0;">لا توجد رسائل.</div>';
}

window.__debugLog = function(msg){
  try{ console.warn('[QBank]', msg); }catch(e){ /* noop */ }
  const text = String(msg);
  window.__debugLogs.push({ time: new Date().toLocaleTimeString(), msg: text });
  if(window.__debugLogs.length > 200) window.__debugLogs.shift();
  try{
    if(typeof state === "undefined" || !state.adminSession) return;
    ensureDebugPanel();
    renderDebugLines();
    updateDebugBadge();
  }catch(e){ /* noop */ }
};
window.addEventListener('error', function(e){
  window.__debugLog('JS Error: ' + (e.message||e) + (e.filename?(' @ '+e.filename+':'+e.lineno):''));
});
window.addEventListener('unhandledrejection', function(e){
  const r = e.reason;
  window.__debugLog('Unhandled Promise: ' + (r && r.message ? r.message : JSON.stringify(r)));
});

/* ══════════════════════════════════════════════════════════════════
   إعدادات الاتصال
   ══════════════════════════════════════════════════════════════════ */
const SUPABASE_URL      = "https://hqpoqldmuyfrxkbbczql.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxcG9xbGRtdXlmcnhrYmJjenFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDE0ODMsImV4cCI6MjA5OTExNzQ4M30.cM_JjWiRjzjbjERSPdeOXYkvSZxneYkd5jrvd8yBlBc";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ══════════════════════════════════════════════════════════════════
   طبقة التخزين المؤقت (Cache) — تقلّل الضغط على قاعدة البيانات
   تخزّن قائمة الأقسام وعدد الأسئلة محليًا بمتصفح كل مستخدم لمدة محددة،
   فبدل ما كل طالب يرسل طلب لقاعدة البيانات عند كل فتح للتطبيق،
   يقرأ من نسخة محفوظة عنده لو لسه صالحة (غير منتهية الصلاحية).
   ══════════════════════════════════════════════════════════════════ */
const CACHE_KEY = "qbank_cache_v1";
// الكاش دائم بجهاز الطالب. عند كل فتح للتطبيق، نقارن "علامة آخر تحديث"
// المخزّنة بجدول app_meta (سطر واحد فقط بقاعدة البيانات، طلب خفيف جدًا)
// مع العلامة المحفوظة بالكاش المحلي. إن تطابقتا نستخدم الكاش مباشرة،
// وإن اختلفتا (لأن الأدمن عدّل شيئاً) نجلب البيانات الكاملة ونحدّث الكاش.

function readCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.updatedAt) return null;
    return parsed;
  }catch(e){ return null; } // أي خطأ بالقراءة (متصفح يمنع التخزين مثلاً) → تجاهل الكاش بأمان
}
function writeCache(categories, examGroups, updatedAt){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      updatedAt,
      categories,
      examGroups,
    }));
  }catch(e){ /* لو فشل الحفظ (خصوصية المتصفح مثلاً) نتجاهل بصمت، التطبيق يشتغل بدون كاش فقط */ }
}
function clearCache(){
  try{ localStorage.removeItem(CACHE_KEY); }catch(e){ /* noop */ }
}

// يقرأ "علامة آخر تحديث" من قاعدة البيانات فقط (طلب خفيف جدًا، سطر واحد)
async function fetchServerUpdatedAt(){
  const { data, error } = await sb.from("app_meta").select("updated_at").eq("id", 1).single();
  if(error) throw error;
  return data.updated_at;
}

// يُستدعى من كل دوال الأدمن بعد أي تعديل ناجح — يحدّث علامة التحديث
// بقاعدة البيانات فيجعل كل الأجهزة (الطلاب) تكتشف التغيير تلقائيًا
// بالمرة التالية اللي يفتحوا فيها التطبيق أو يتنقلوا بالأقسام.
async function bumpServerUpdatedAt(){
  try{
    await sb.from("app_meta").update({ updated_at: new Date().toISOString() }).eq("id", 1);
  }catch(e){
    window.__debugLog('bumpServerUpdatedAt error: ' + (e.message || JSON.stringify(e)) + ' — تأكد من إنشاء جدول app_meta بالخطوات المرفقة.');
  }
}

/* ══════════════════════════════════════════════════════════════════
   حالة التطبيق
   ══════════════════════════════════════════════════════════════════ */
const state = {
  view: "loading",
  categories: [],
  examGroups: [],
  path: [],
  quiz: null,
  adminTab: "tree",
  manageSelectedCategory: null,
  manageQuestions: [],
  manageSearch: "",
  adminSession: null,
  notice: null,
  resumeAvailable: null,
};

function byId(id){ return state.categories.find(c => c.id === id); }
function childrenOf(parentId){
  return state.categories
    .filter(c => c.parent_id === parentId)
    .sort((a,b) => (a.sort_order||0) - (b.sort_order||0) || a.name.localeCompare(b.name,'ar'));
}
function descendantIds(rootId){
  const seen = new Set([rootId]);
  const out = [rootId];
  const stack = [rootId];
  while(stack.length){
    const cur = stack.pop();
    for(const c of childrenOf(cur)){
      if(seen.has(c.id)) continue;
      seen.add(c.id);
      out.push(c.id);
      stack.push(c.id);
    }
  }
  return out;
}
function nodeHasQuestions(id){
  return nodeQuestionCount(id) > 0;
}
function directQuestionCount(id){
  const c = byId(id);
  return c ? (c.direct_question_count || 0) : 0;
}
function nodeQuestionCount(id){
  return descendantIds(id).reduce((sum, id2) => sum + directQuestionCount(id2), 0);
}
// إيجاد كل الامتحانات الشاملة المرتبطة بقسم معيّن (أو null لصفحة الرئيسية)
function examGroupsFor(categoryId){
  return state.examGroups
    .filter(g => (g.attach_to || null) === (categoryId || null))
    .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
}
// عدد الأسئلة الكلي لامتحان شامل معيّن (مجموع الأسئلة المباشرة بكل الأقسام المختارة فيه)
function examGroupQuestionCount(group){
  const ids = new Set(group.category_ids || []);
  return Array.from(ids).reduce((sum, id) => sum + directQuestionCount(id), 0);
}

/* ══════════════════════════════════════════════════════════════════
   تحميل البيانات — يستخدم الكاش المحلي أولاً إن وُجد وصالح،
   وإلا يجلب من Supabase ثم يحفظ نسخة جديدة بالكاش.
   forceRefresh=true تتجاوز الكاش (تُستخدم بعد أي تعديل إداري).
   ══════════════════════════════════════════════════════════════════ */
async function loadAll(forceRefresh){
  state.view = "loading"; render();

  const cached = readCache();

  if(!forceRefresh && cached){
    try{
      const serverUpdatedAt = await fetchServerUpdatedAt();
      if(serverUpdatedAt === cached.updatedAt){
        state.categories = cached.categories;
        state.examGroups = cached.examGroups || [];
        state.view = "home";
        state.resumeAvailable = readProgress();
        window.__debugLog('loadAll: لا يوجد تحديث جديد — تم استخدام الكاش المحلي مباشرة.');
        render();
        return;
      }
      window.__debugLog('loadAll: تم رصد تحديث جديد من الأدمن — سيتم تحميل البيانات الكاملة.');
    }catch(err){
      window.__debugLog('fetchServerUpdatedAt error: ' + (err.message || JSON.stringify(err)) + ' — سيتم تحميل البيانات كاملة كإجراء احتياطي. تأكد من إنشاء جدول app_meta.');
    }
  }

  try{
    // ملاحظة أداء مهمة: لا نجلب أبدًا كل صفوف جدول questions هنا.
    // عدد الأسئلة لكل قسم مخزّن مباشرة بعمود direct_question_count بجدول categories
    // (يتحدّث تلقائيًا بواسطة Trigger بقاعدة البيانات)، فهذا يلغي الحاجة لتحميل
    // آلاف الصفوف فقط لحساب عددها — طلب واحد خفيف بدل طلب ثقيل بحجم الجدول كامل.
    const [{data:cats, error:e1}, {data:groups, error:e3}, latestUpdatedAt] = await Promise.all([
      sb.from("categories").select("id,parent_id,name,sort_order,direct_question_count"),
      sb.from("exam_groups").select("id,title,attach_to,category_ids,sort_order"),
      fetchServerUpdatedAt().catch(()=>null),
    ]);
    if(e1) throw e1;
    if(e3) throw e3;
    state.categories = (cats || []).map(c => ({
      ...c,
      id: String(c.id),
      parent_id: (c.parent_id === null || c.parent_id === undefined) ? null : String(c.parent_id),
      direct_question_count: c.direct_question_count || 0,
    }));
    state.examGroups = (groups || []).map(g => ({
      ...g,
      id: String(g.id),
      attach_to: (g.attach_to === null || g.attach_to === undefined) ? null : String(g.attach_to),
      category_ids: (g.category_ids || []).map(String),
    }));
    writeCache(state.categories, state.examGroups, latestUpdatedAt);
    window.__debugLog('loadAll ok (من قاعدة البيانات مباشرة) — categories: ' + state.categories.length + ', exam groups: ' + state.examGroups.length + '.');
    state.view = "home";
    state.resumeAvailable = readProgress();
  }catch(err){
    state.view = "connectionError";
    state.notice = state.adminSession ? (err.message || String(err)) : "تعذّر تحميل البيانات حالياً، حاول مرة أخرى بعد قليل.";
    window.__debugLog('loadAll error: ' + (err.message || JSON.stringify(err)));
  }
  render();
}

/* ══════════════════════════════════════════════════════════════════
   محلّل النصوص إلى أسئلة
   ══════════════════════════════════════════════════════════════════ */
function parseQuestionsFromText(raw){
  const AR_MAP = {"أ":0,"ا":0,"ب":1,"ج":2,"د":3,"هـ":4,"ه":4,"و":5};

  // ── أنماط التعرف على الخيارات ──────────────────────────────────────
  const OPT_LATIN = /^(?:([A-Ja-j])\s*[.):\-]\s*|\(([A-Ja-j])\)\s*)(.*)$/;
  const OPT_ARABIC = /^(أ|ا|ب|ج|د|هـ|ه|و)\s*[.)\-:]\s*(.*)$/;
  const INLINE_OPT_RE = /([A-Ja-j])\s*[.)]\s*(.*?)(?=\s+[A-Ja-j]\s*[.)]|$)/gi;

  // ── سطر إجابة / شرح / سؤال مرقّم ─────────────────────────────────────
  const ANSWER_KEY = /^(?:Correct\s*Answer|Answers?|Ans|Correct|الإجابة\s*الصحيحة?|الإجابة|الجواب|الحل)\s*[:=\-]\s*(.+)$/i;
  const EXPLANATION_KEY = /^(?:Explanation|Explain|Rationale|Note|ملاحظة|التفسير|السبب|التوضيح|توضيح|الشرح|شرح)\s*[:=\-]\s*(.+)$/i;
  const QNUM = /^(?:Q(?:uestion)?s?\.?\s*)?(\d+)\s*[.)\-:؟]\s*(.*)$/i;
  const TF_WORD = /^(صح|خطأ|True|False)$/i;
  const LONE_LETTER_LATIN = /^([A-Ja-j])$/;
  const LONE_LETTER_ARABIC = /^(أ|ا|ب|ج|د|هـ|ه|و)$/;
  const DIVIDER = /^[-_=*#]{3,}\s*$/;
  const STEM_START = /^(?:Which|What|Who|When|Where|How|Why|Choose|Select|True|False|ما|من|أي|اختر|حدد|صح|خطأ|هل)\b/i;

  // ── مفتاح إجابات منفصل (Answer Key) ─────────────────────────────────
  const KEY_HDR = /^(?:answers?\s*key|key|answers?|الإجابات?|مفتاح\s*الإجابات?)\s*:?\s*$/i;
  const KEY_LINE = /^(\d+)\s*[-.):\s]\s*([A-Ja-j])\s*$/i;

  // ── أنماط إجابات خاصة: All / None / أكثر من حرف ────────────────────
  const ALL_PAT = /^(?:ALL(?:\s+OF\s+(?:THE\s+)?ABOVE)?|كل\s*(?:ما\s*)?(?:سبق|ذكر)|جميع\s*(?:ما\s*)?(?:سبق|ذكر)|كلها|كلهم|جميعها|جميعهم|كل\s*الخيارات?\s*(?:صحيحة|صحيح)?)$/i;
  const NONE_PAT = /^(?:NONE(?:\s+OF\s+(?:THE\s+)?ABOVE)?|لا\s*شيء(?:\s*مما\s*(?:سبق|ذكر))?|لا\s*(?:شيء|إجابة)\s*(?:من\s*)?(?:ما\s*)?(?:سبق|صحيحة?)?)$/i;
  const MULTI_LETTER_PAT = /^[A-Ja-j](?:\s*(?:and|or|و|،|,|&|\+|\/)\s*[A-Ja-j])+$/i;

  function cleanOption(o){
    return o.trim().replace(/\s*\.{2,}\s*$/,"").replace(/\s*\.\s*$/,"").replace(/\s+/g," ").trim();
  }

  // يُعيد: رقم (index) أو "ALL" أو "NONE" أو "MULTI:ABC" أو null
  function parseAnswerValue(raw){
    const s = raw.trim();
    if(ALL_PAT.test(s)) return "ALL";
    if(NONE_PAT.test(s)) return "NONE";
    if(MULTI_LETTER_PAT.test(s)){
      const letters = (s.match(/[A-Ja-j]/g) || []).map(l=>l.toUpperCase());
      const unique = [...new Set(letters)];
      if(unique.length > 1) return "MULTI:" + unique.join("");
    }
    for(const [ar, idx] of Object.entries(AR_MAP)){
      if(s === ar) return idx;
    }
    const single = s.match(/^([A-Ja-j])\s*$/i);
    if(single) return single[1].toUpperCase().charCodeAt(0) - 65;
    const n = parseInt(s,10);
    if(!isNaN(n) && String(n) === s) return n - 1; // رقم صريح (1-based) كإجابة
    return null;
  }

  // يبني خيارًا إضافيًا يمثّل "كلا الحرفين صحيحان" — نفس حيلة بوت البايثون،
  // بحيث يبقى الشكل متوافقًا مع قاعدة البيانات الحالية (إجابة صحيحة واحدة فقط)
  function buildMultiOption(opts, letters){
    const label = letters.split("").join(" & ");
    const combo = `(${label}) كلاهما صحيح ✔`;
    const newOpts = opts.map(cleanOption).concat([combo]);
    return { options: newOpts, correct: newOpts.length - 1 };
  }

  function matchOption(line){
    const mLat = line.match(OPT_LATIN);
    if(mLat) return { text: (mLat[3]||"").trim() };
    const mAr = line.match(OPT_ARABIC);
    if(mAr) return { text: (mAr[2]||"").trim() };
    return null;
  }
  function parseInlineOptions(line){
    const matches = [...line.matchAll(INLINE_OPT_RE)];
    if(matches.length >= 2) return matches.map(m => cleanOption(m[2]));
    return null;
  }

  const lines = raw.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");

  // ── الخطوة 1: اكتشاف مفتاح إجابات منفصل (Answer Key) إن وُجد ────────
  const answerKeyMap = {};
  const keyLineIdx = new Set();
  let inKey = false;
  for(let i=0;i<lines.length;i++){
    const s = lines[i].trim();
    if(KEY_HDR.test(s)){ inKey = true; keyLineIdx.add(i); continue; }
    if(inKey){
      const mk = s.match(KEY_LINE);
      if(mk){ answerKeyMap[parseInt(mk[1],10)] = mk[2].toUpperCase(); keyLineIdx.add(i); }
      else if(s && !DIVIDER.test(s)){ inKey = false; }
    }
  }
  if(keyLineIdx.size < 3){ /* مفتاح غير موثوق (أقل من 3 أسطر) → تجاهله */ }
  const useAnswerKey = keyLineIdx.size >= 3;

  // ── الخطوة 2: التحليل سطرًا سطرًا ────────────────────────────────────
  const questions = [];
  let curLines = [], curOpts = [], curAns = null, curExpl = null, curNum = null;
  let autoCtr = 0;

  function resetCur(){ curLines=[]; curOpts=[]; curAns=null; curExpl=null; curNum=null; }

  function flush(){
    if(!curLines.length) return;
    if(curAns === null && curNum !== null && useAnswerKey && answerKeyMap[curNum]){
      curAns = answerKeyMap[curNum].toUpperCase().charCodeAt(0) - 65;
    }
    if(curAns === null || curOpts.length < 2) return;

    const qText = curLines.join(" ").trim();
    const cleaned = curOpts.map(cleanOption);

    function add(opts, correct){
      if(opts.length >= 2 && correct < opts.length){
        questions.push({ question: qText, options: opts, correct, explanation: curExpl ? curExpl.trim() : null });
      }
    }

    if(curAns === "ALL"){
      add(cleaned.concat(["كل ما سبق ✔"]), cleaned.length);
    } else if(curAns === "NONE"){
      add(cleaned.concat(["لا شيء مما سبق ✔"]), cleaned.length);
    } else if(typeof curAns === "string" && curAns.startsWith("MULTI:")){
      const built = buildMultiOption(curOpts, curAns.slice(6));
      add(built.options, built.correct);
    } else if(typeof curAns === "number"){
      add(cleaned, curAns);
    }
  }

  for(let i=0;i<lines.length;i++){
    if(keyLineIdx.has(i)) continue;
    const line = lines[i].trim();

    if(!line || DIVIDER.test(line)){
      if(curAns !== null && curOpts.length){ flush(); resetCur(); }
      continue;
    }
    if(KEY_HDR.test(line)){
      if(curLines.length){ flush(); resetCur(); }
      continue;
    }

    // شرح
    const mExp = line.match(EXPLANATION_KEY);
    if(mExp){ curExpl = mExp[1]; continue; }

    // سؤال مرقّم جديد (لا يبدأ سؤال جديد إذا كان السطر فعليًا سطر إجابة)
    const mQ = line.match(QNUM);
    if(mQ && !ANSWER_KEY.test(line)){
      flush();
      autoCtr++;
      resetCur();
      curNum = parseInt(mQ[1],10);
      curLines = [(mQ[2]||"").trim()];
      continue;
    }

    // إجابة صريحة
    const mAns = line.match(ANSWER_KEY);
    if(mAns){
      curAns = parseAnswerValue(mAns[1]);
      continue;
    }

    // خيار (لاتيني أو عربي) — مع دعم عدة خيارات بنفس السطر
    const optMatch = matchOption(line);
    if(optMatch){
      const inline = parseInlineOptions(line);
      if(inline){ curOpts = inline; }
      else { curOpts.push(optMatch.text); }
      continue;
    }

    // حرف منفرد كإجابة بعد الخيارات
    if(curOpts.length >= 2 && curAns === null){
      if(LONE_LETTER_LATIN.test(line)){ curAns = line.toUpperCase().charCodeAt(0)-65; continue; }
      if(LONE_LETTER_ARABIC.test(line)){ curAns = AR_MAP[line]; continue; }
    }

    // True/False تلقائي (سؤال ثنائي بدون خيارات مكتوبة صراحة)
    if(curOpts.length === 0 && TF_WORD.test(line) && curLines.length){
      const isTrue = /^(صح|True)$/i.test(line);
      curOpts = [isTrue ? "صح ✅" : "خطأ ❌", isTrue ? "خطأ ❌" : "صح ✅"];
      curAns = 0;
      continue;
    }

    // استمرار نص خيار (سطر تالٍ بدون رمز خيار، والإجابة لم تُحدد بعد)
    if(curOpts.length && curAns === null){
      const inline = parseInlineOptions(line);
      if(inline){ curOpts = inline; }
      else { curOpts[curOpts.length-1] += " " + line; }
      continue;
    }

    // استمرار نص السؤال (لا خيارات بعد ولا إجابة)
    if(curLines.length && curAns === null && curOpts.length === 0){
      curLines.push(line);
      continue;
    }

    // سؤال جديد بدون رقم (يبدأ بكلمة استفهام معروفة)
    if(STEM_START.test(line)){
      flush();
      autoCtr++;
      resetCur();
      curNum = autoCtr;
      curLines = [line];
      continue;
    }

    // أي سطر آخر غير مصنّف: يُعتبر بداية سؤال جديد احتياطيًا
    if(!curLines.length){
      resetCur();
      curLines = [line];
    }
  }
  flush();
  return questions;
}

/* ══════════════════════════════════════════════════════════════════
   منطق الاختبار
   ══════════════════════════════════════════════════════════════════ */
const PROGRESS_KEY = "qbank_progress_v1";

// يُحفظ محليًا بجهاز الطالب فقط (لا يُرسل لقاعدة البيانات) — يسمح باستئناف
// الاختبار من نفس النقطة لو أغلق الطالب التطبيق بمنتصف الحل.
function saveProgress(){
  if(!state.quiz) return;
  try{
    localStorage.setItem(PROGRESS_KEY, JSON.stringify({
      savedAt: Date.now(),
      quiz: state.quiz,
    }));
  }catch(e){ /* noop — فشل الحفظ لا يوقف الاختبار، فقط لن يُستأنف لاحقًا */ }
}
function clearProgress(){
  try{ localStorage.removeItem(PROGRESS_KEY); }catch(e){ /* noop */ }
}
function readProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.quiz || !parsed.quiz.questions || !parsed.quiz.questions.length) return null;
    return parsed;
  }catch(e){ return null; }
}
window.resumeProgress = () => {
  const p = readProgress();
  if(!p){ state.resumeAvailable = null; render(); return; }
  state.quiz = p.quiz;
  state.view = "quiz";
  state.notice = null;
  render();
};
window.discardProgress = () => {
  clearProgress();
  state.resumeAvailable = null;
  render();
};

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

async function startQuiz(nodeId, includeSub){
  try{
    // نطلب فقط الأعمدة المطلوبة فعليًا بدل "*" لتقليل الحمل على قاعدة البيانات
    let query = sb.from("questions").select("id,category_id,question_text,options,correct_index,explanation");
    if(includeSub){
      const ids = Array.from(new Set(descendantIds(String(nodeId))));
      query = query.in("category_id", ids);
    } else {
      query = query.eq("category_id", String(nodeId));
    }
    const { data, error } = await query;
    if(error){ console.error("startQuiz error:", error); window.__debugLog('startQuiz supabase error: ' + error.message + ' | code: ' + (error.code||'')); state.notice = state.adminSession ? ("خطأ أثناء تحميل الأسئلة: " + error.message) : "تعذّر تحميل الأسئلة، حاول مرة أخرى."; render(); return; }
    if(!data || !data.length){
      window.__debugLog('startQuiz: query succeeded but returned 0 rows. mode: ' + (includeSub?'includeSub':'direct') + ', node id: ' + nodeId + '.');
      state.notice = "لا توجد أسئلة في هذا القسم بعد.";
      render();
      return;
    }
    const questions = shuffleArray(data).map(row => ({
      id: row.id,
      question: row.question_text,
      options: row.options,
      correct: row.correct_index,
      explanation: row.explanation || null,
    }));
    const catName = (byId(String(nodeId)) || {}).name || "";
    state.quiz = {
      questions, index:0, correct:0, wrongList:[], answered:false, selected:null,
      userAnswers: new Array(questions.length).fill(null),
      sourceLabel: catName + (includeSub ? " (شامل)" : ""),
      sourceType: "category", sourceNodeId: String(nodeId), sourceIncludeSub: !!includeSub,
    };
    state.view = "quiz";
    state.notice = null;
    saveProgress();
    render();
  }catch(err){
    console.error("startQuiz exception:", err);
    window.__debugLog('startQuiz exception: ' + (err.message || JSON.stringify(err)));
    state.notice = state.adminSession ? ("حدث خطأ غير متوقع أثناء بدء الاختبار: " + (err.message || String(err))) : "حدث خطأ غير متوقع، حاول مرة أخرى.";
    render();
  }
}

async function startCustomExam(groupId){
  const group = state.examGroups.find(g => g.id === groupId);
  if(!group || !group.category_ids || !group.category_ids.length){
    state.notice = "هذا الامتحان الشامل غير مُعد بشكل صحيح.";
    render();
    return;
  }
  try{
    const { data, error } = await sb.from("questions")
      .select("id,category_id,question_text,options,correct_index,explanation")
      .in("category_id", group.category_ids);
    if(error){ window.__debugLog('startCustomExam supabase error: ' + error.message); state.notice = state.adminSession ? ("خطأ: " + error.message) : "تعذّر تحميل الأسئلة، حاول مرة أخرى."; render(); return; }
    if(!data || !data.length){
      state.notice = "لا توجد أسئلة بعد بهذا الامتحان الشامل.";
      render();
      return;
    }
    const questions = shuffleArray(data).map(row => ({
      id: row.id,
      question: row.question_text,
      options: row.options,
      correct: row.correct_index,
      explanation: row.explanation || null,
    }));
    state.quiz = {
      questions, index:0, correct:0, wrongList:[], answered:false, selected:null,
      userAnswers: new Array(questions.length).fill(null),
      sourceLabel: group.title,
      sourceType: "examGroup", sourceGroupId: groupId,
    };
    state.view = "quiz";
    state.notice = null;
    saveProgress();
    render();
  }catch(err){
    window.__debugLog('startCustomExam exception: ' + (err.message || JSON.stringify(err)));
    state.notice = "حدث خطأ غير متوقع، حاول مرة أخرى.";
    render();
  }
}

/* ══════════════════════════════════════════════════════════════════
   أدمن: إدارة الامتحانات الشاملة المخصصة
   ══════════════════════════════════════════════════════════════════ */
let examBuilder = { id: null, title: "", attachTo: null, selected: new Set() };

function resetExamBuilder(){
  examBuilder = { id: null, title: "", attachTo: null, selected: new Set() };
}
function loadExamIntoBuilder(id){
  const g = state.examGroups.find(x => x.id === id);
  if(!g) return;
  examBuilder = {
    id: g.id,
    title: g.title,
    attachTo: g.attach_to || null,
    selected: new Set(g.category_ids || []),
  };
  render();
}
function toggleExamBuilderCategory(id){
  if(examBuilder.selected.has(id)) examBuilder.selected.delete(id);
  else examBuilder.selected.add(id);
  render();
}
async function saveExamGroup(){
  const title = (examBuilder.title || "").trim();
  const attachTo = examBuilder.attachTo || null;
  if(!title){ state.notice = "أدخل اسمًا للامتحان الشامل."; render(); return; }
  if(!examBuilder.selected.size){ state.notice = "اختر قسمًا واحدًا على الأقل."; render(); return; }
  const category_ids = Array.from(examBuilder.selected);
  if(examBuilder.id){
    const { error } = await sb.from("exam_groups").update({ title, attach_to: attachTo, category_ids }).eq("id", examBuilder.id);
    if(error){ state.notice = error.message; render(); return; }
  } else {
    const { error } = await sb.from("exam_groups").insert({ title, attach_to: attachTo, category_ids, sort_order: state.examGroups.length });
    if(error){ state.notice = error.message; render(); return; }
  }
  resetExamBuilder();
  state.notice = "تم حفظ الامتحان الشامل بنجاح.";
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; state.adminTab = "exams";
  render();
}
async function deleteExamGroup(id){
  const ok = confirm("سيتم حذف هذا الامتحان الشامل (لن يحذف الأسئلة أو الأقسام نفسها). متابعة؟");
  if(!ok) return;
  const { error } = await sb.from("exam_groups").delete().eq("id", id);
  if(error){ state.notice = error.message; }
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; state.adminTab = "exams";
  render();
}

/* ══════════════════════════════════════════════════════════════════
   أدمن: إدارة الأسئلة الموجودة (تصفح حسب القسم، تعديل، حذف)
   ══════════════════════════════════════════════════════════════════ */
let questionEditor = null; // {id, question, options:[], correct, explanation, category_id} أو null

async function loadQuestionsForCategory(categoryId){
  state.manageSelectedCategory = categoryId || null;
  state.manageQuestions = [];
  questionEditor = null;
  render();
  if(!categoryId) return;
  const { data, error } = await sb.from("questions")
    .select("id,category_id,question_text,options,correct_index,explanation")
    .eq("category_id", categoryId)
    .order("id", { ascending: true });
  if(error){ state.notice = error.message; render(); return; }
  state.manageQuestions = data || [];
  render();
}

function startEditQuestionById(id){
  const q = state.manageQuestions.find(x => String(x.id) === String(id));
  if(q) startEditQuestion(q);
}
function startEditQuestion(q){
  questionEditor = {
    id: q.id,
    category_id: q.category_id,
    question: q.question_text,
    options: [...q.options],
    correct: q.correct_index,
    explanation: q.explanation || "",
  };
  render();
}
function cancelEditQuestion(){
  questionEditor = null;
  render();
}
function editorSetOption(i, val){
  questionEditor.options[i] = val;
}
function editorAddOption(){
  questionEditor.options.push("");
  render();
}
function editorRemoveOption(i){
  if(questionEditor.options.length <= 2){ state.notice = "لازم يبقى خيارين على الأقل."; render(); return; }
  questionEditor.options.splice(i,1);
  if(questionEditor.correct === i) questionEditor.correct = 0;
  else if(questionEditor.correct > i) questionEditor.correct--;
  render();
}
function editorSetCorrect(i){
  questionEditor.correct = i;
  render();
}
async function saveQuestionEdit(){
  const qText = (questionEditor.question || "").trim();
  const expText = (questionEditor.explanation || "").trim();
  const newCategoryId = questionEditor.category_id;
  if(!qText){ state.notice = "نص السؤال لا يمكن أن يكون فارغًا."; render(); return; }
  const options = questionEditor.options.map(o=>o.trim()).filter(o=>o.length);
  if(options.length < 2){ state.notice = "لازم يبقى خيارين صالحين على الأقل."; render(); return; }
  if(questionEditor.correct >= options.length){ state.notice = "حدد الإجابة الصحيحة بشكل صحيح."; render(); return; }

  const { error } = await sb.from("questions").update({
    question_text: qText,
    options: options,
    correct_index: questionEditor.correct,
    explanation: expText || null,
    category_id: newCategoryId,
  }).eq("id", questionEditor.id);

  if(error){ state.notice = error.message; render(); return; }
  state.notice = "تم حفظ التعديلات بنجاح.";
  const categoryChanged = newCategoryId !== questionEditor.category_id;
  questionEditor = null;
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  // لو تغيّر القسم، اعرض قائمة القسم الجديد؛ وإلا أعد تحميل نفس القسم الحالي
  await loadQuestionsForCategory(categoryChanged ? newCategoryId : state.manageSelectedCategory);
  state.view = "admin"; state.adminTab = "manage";
  render();
}
async function deleteQuestion(id){
  const ok = confirm("سيتم حذف هذا السؤال نهائيًا. متابعة؟");
  if(!ok) return;
  const { error } = await sb.from("questions").delete().eq("id", id);
  if(error){ state.notice = error.message; render(); return; }
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  await loadQuestionsForCategory(state.manageSelectedCategory);
  state.view = "admin"; state.adminTab = "manage";
  render();
}

function answerQuestion(optIndex){
  const q = state.quiz;
  if(q.answered) return;
  q.answered = true;
  q.selected = optIndex;
  const question = q.questions[q.index];
  if(!q.userAnswers) q.userAnswers = new Array(q.questions.length).fill(null);
  q.userAnswers[q.index] = optIndex;
  if(optIndex === question.correct){
    q.correct++;
  } else {
    q.wrongList.push({ question, chosen: optIndex });
  }
  saveProgress();
  render();
}

function nextQuestion(){
  const q = state.quiz;
  if(q.index+1 < q.questions.length){
    q.index++; q.answered=false; q.selected=null;
    saveProgress();
    render();
  } else {
    state.view = "results";
    clearProgress(); // الاختبار انتهى بالكامل — لا داعي لبقاء تقدم محفوظ
    render();
  }
}

   لتتجاوز الكاش المحلي وتجلب أحدث بيانات فورًا بعد أي تعديل إداري.
   ══════════════════════════════════════════════════════════════════ */
async function addCategory(parentId, name){
  if(!name || !name.trim()) return;
  const siblings = childrenOf(parentId);
  const sort_order = siblings.length;
  const { error } = await sb.from("categories").insert({ parent_id: parentId, name: name.trim(), sort_order });
  if(error){ state.notice = error.message; render(); return; }
  if(parentId) treeExpanded.add(parentId);
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; render();
}
async function renameCategory(id, name){
  if(!name || !name.trim()) return;
  const { error } = await sb.from("categories").update({ name: name.trim() }).eq("id", id);
  if(error){ state.notice = error.message; }
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; render();
}
async function deleteCategory(id){
  const ok = confirm("سيتم حذف هذا القسم وكل ما بداخله (أقسام فرعية وأسئلة). متابعة؟");
  if(!ok) return;
  const { error } = await sb.from("categories").delete().eq("id", id);
  if(error){ state.notice = error.message; }
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; render();
}
async function moveCategory(id, dir){
  const cat = byId(id);
  const siblings = childrenOf(cat.parent_id);
  const idx = siblings.findIndex(s=>s.id===id);
  const swapWith = siblings[idx+dir];
  if(!swapWith) return;
  await sb.from("categories").update({ sort_order: swapWith.sort_order ?? idx+dir }).eq("id", cat.id);
  await sb.from("categories").update({ sort_order: cat.sort_order ?? idx }).eq("id", swapWith.id);
  clearCache();
  await bumpServerUpdatedAt();
  await loadAll(true);
  state.view = "admin"; render();
}

function renderTreeNode(node, depth, visited){
  visited = visited || new Set();
  if(visited.has(node.id) || depth > 50){
    window.__debugLog('تم اكتشاف حلقة دائرية (Circular Reference) في الأقسام عند: ' + node.name + ' (id=' + node.id + ').');
    return `<div class="treeNode"><div class="treeRow"><span class="name" style="color:var(--danger);">⚠ ${esc(node.name)} — خطأ: هذا القسم جزء من حلقة دائرية في الأقسام (parent_id غير صحيح)</span></div></div>`;
  }
  visited = new Set(visited);
  visited.add(node.id);
  const kids = childrenOf(node.id);
  const hasKids = kids.length > 0;
  const isOpen = treeExpanded.has(node.id);
  const toggleBtn = hasKids
    ? `<button class="iconBtn" title="${isOpen?'طي':'فتح'}" onclick="toggleTreeExpand('${node.id}')" style="font-size:12px;width:22px;">${isOpen?'▾':'▸'}</button>`
    : `<span style="width:22px;display:inline-block;"></span>`;
  return `
    <div class="treeNode">
      <div class="treeRow">
        ${toggleBtn}
        <span class="name" ${hasKids?`style="cursor:pointer;" onclick="toggleTreeExpand('${node.id}')"`:""}>${esc(node.name)}</span>
        <span style="font-size:11px;color:var(--text-dim);">${(()=>{const d=directQuestionCount(node.id),t=nodeQuestionCount(node.id);return t>d? `${d} سؤال مباشر (${t} شاملاً الفروع)` : `${d} سؤال`;})()}</span>
        <button class="iconBtn" title="إضافة قسم فرعي" onclick="promptAddCategory('${node.id}')">➕</button>
        <button class="iconBtn" title="إعادة تسمية" onclick="promptRenameCategory('${node.id}','${escAttr(node.name)}')">✎</button>
        <button class="iconBtn" title="تحريك لأعلى" onclick="moveCategory('${node.id}',-1)">↑</button>
        <button class="iconBtn" title="تحريك لأسفل" onclick="moveCategory('${node.id}',1)">↓</button>
        <button class="iconBtn danger" title="حذف" onclick="deleteCategory('${node.id}')">🗑</button>
      </div>
      ${hasKids && isOpen ? `<div class="treeChildren">${kids.map(k=>renderTreeNode(k, depth+1, visited)).join("")}</div>` : ""}
    </div>`;
}

function toggleTreeExpand(id){
  if(treeExpanded.has(id)) treeExpanded.delete(id);
  else treeExpanded.add(id);
  render();
}
function toggleExamTreeExpand(id){
  if(examTreeExpanded.has(id)) examTreeExpanded.delete(id);
  else examTreeExpanded.add(id);
  render();
}

function catOptionsHtml(selectedId){
  function walk(parentId, depth, visited){
    visited = visited || new Set();
    let out = [];
    for(const c of childrenOf(parentId)){
      if(visited.has(c.id) || depth > 50){
        window.__debugLog('تم اكتشاف حلقة دائرية (Circular Reference) في الأقسام عند: ' + c.name + ' (id=' + c.id + ').');
        continue;
      }
      out.push(`<option value="${c.id}" ${c.id===selectedId?"selected":""}>${"— ".repeat(depth)}${esc(c.name)}</option>`);
      const nextVisited = new Set(visited);
      nextVisited.add(c.id);
      out = out.concat(walk(c.id, depth+1, nextVisited));
    }
    return out;
  }
  return walk(null,0).join("");
}

    <div class="divider"><span class="gem"></span></div>
    <div style="font-weight:700;margin-bottom:10px;">معاينة (${pendingParsed.length} سؤال مستخرج)</div>
    ${pendingParsed.map((q,i)=>`
      <div class="previewCard">
        <button class="iconBtn danger rm" onclick="removePendingAt(${i})">✕</button>
        <div class="qn">${i+1}. ${esc(q.question)}</div>
        ${q.options.map((o,j)=>`<div class="op ${j===q.correct?'correct':''}">${j===q.correct?'✔':'•'} ${esc(o)}</div>`).join("")}
        ${q.explanation ? `<div style="font-size:12px;color:var(--sapphire);margin-top:6px;">💡 ${esc(q.explanation)}</div>` : ""}
      </div>`).join("")}
  ` : "";

  return `
    <div class="field">
      <label>القسم الذي ستُضاف إليه الأسئلة</label>
      <select id="targetCategory">
        <option value="">— اختر القسم —</option>
        ${catOptionsHtml(null)}
      </select>
    </div>
    <div class="field">
      <label>الصق نص الأسئلة هنا (يمكن إضافة سطر Explanation: بعد الإجابة لشرح اختياري)</label>
      <textarea id="pasteText" placeholder="1. نص السؤال؟&#10;أ. خيار أول&#10;ب. خيار ثاني&#10;ج. خيار ثالث&#10;د. خيار رابع&#10;الإجابة: ب&#10;Explanation: سبب كون ب هي الإجابة الصحيحة"></textarea>
    </div>
    <div class="field">
      <label>أو ارفع ملف نصي (txt)</label>
      <input type="file" id="fileInput" accept=".txt">
    </div>
    <button class="btn gold block" onclick="handleParseClick()">استخراج الأسئلة من النص</button>
    ${previewHtml}
    ${pendingParsed.length ? `
      <button class="btn primary block" style="margin-top:14px;" onclick="handleSaveClick()">حفظ الأسئلة في القسم المختار</button>
    ` : ""}
  `;
}

function renderExamCheckTree(node, depth, visited){
  visited = visited || new Set();
  if(visited.has(node.id) || depth > 50) return "";
  visited = new Set(visited);
  visited.add(node.id);
  const kids = childrenOf(node.id);
  const hasKids = kids.length > 0;
  const isOpen = examTreeExpanded.has(node.id);
  const checked = examBuilder.selected.has(node.id);
  const toggleBtn = hasKids
    ? `<button class="iconBtn" title="${isOpen?'طي':'فتح'}" onclick="toggleExamTreeExpand('${node.id}')" style="font-size:12px;width:22px;">${isOpen?'▾':'▸'}</button>`
    : `<span style="width:22px;display:inline-block;"></span>`;
  return `
    <div class="treeNode">
      <div class="treeRow">
        ${toggleBtn}
        <input type="checkbox" ${checked?"checked":""} onchange="toggleExamBuilderCategory('${node.id}')" style="width:18px;height:18px;">
        <span class="name" ${hasKids?`style="cursor:pointer;" onclick="toggleExamTreeExpand('${node.id}')"`:""}>${esc(node.name)}</span>
        <span style="font-size:11px;color:var(--text-dim);">${directQuestionCount(node.id)} سؤال</span>
      </div>
      ${hasKids && isOpen ? `<div class="treeChildren">${kids.map(k=>renderExamCheckTree(k, depth+1, visited)).join("")}</div>` : ""}
    </div>`;
}

function renderAdminManage(){
  const searchLower = (state.manageSearch || "").trim().toLowerCase();
  const filtered = searchLower
    ? state.manageQuestions.filter(q => (q.question_text||"").toLowerCase().includes(searchLower))
    : state.manageQuestions;

  if(questionEditor){
    return `
      <div style="font-weight:700;font-size:14.5px;margin-bottom:14px;">تعديل السؤال</div>
      <div class="field">
        <label>نص السؤال</label>
        <textarea oninput="questionEditor.question=this.value" style="min-height:80px;">${esc(questionEditor.question)}</textarea>
      </div>
      <div class="field">
        <label>نقل السؤال لقسم آخر (اختياري)</label>
        <select onchange="questionEditor.category_id=this.value">
          ${catOptionsHtml(questionEditor.category_id)}
        </select>
      </div>
      <div class="field">
        <label>الخيارات (حدد ⚪ الإجابة الصحيحة)</label>
        ${questionEditor.options.map((opt,i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input type="radio" name="correctOpt" ${questionEditor.correct===i?"checked":""} onchange="editorSetCorrect(${i})" style="width:18px;height:18px;flex:none;">
            <input type="text" value="${escAttr(opt)}" oninput="editorSetOption(${i}, this.value)" style="flex:1;padding:9px 10px;border-radius:6px;border:1px solid var(--gold-dim);background:var(--panel-2);color:var(--parchment);">
            <button class="iconBtn danger" title="حذف الخيار" onclick="editorRemoveOption(${i})">✕</button>
          </div>`).join("")}
        <button class="btn ghost sm" onclick="editorAddOption()">➕ إضافة خيار</button>
      </div>
      <div class="field">
        <label>الشرح (اختياري)</label>
        <textarea oninput="questionEditor.explanation=this.value" placeholder="اتركه فارغًا لعدم عرض شرح">${esc(questionEditor.explanation)}</textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn primary block" onclick="saveQuestionEdit()">حفظ التعديلات</button>
        <button class="btn ghost sm" onclick="cancelEditQuestion()">إلغاء</button>
      </div>
    `;
  }

  return `
    <div class="field">
      <label>اختر القسم لعرض أسئلته</label>
      <select onchange="loadQuestionsForCategory(this.value)">
        <option value="">— اختر القسم —</option>
        ${catOptionsHtml(state.manageSelectedCategory)}
      </select>
    </div>
    ${state.manageSelectedCategory ? `
      <div class="field">
        <label>بحث ضمن أسئلة هذا القسم</label>
        <input type="text" value="${escAttr(state.manageSearch)}" oninput="state.manageSearch=this.value; render();" placeholder="اكتب جزءًا من نص السؤال...">
      </div>
      <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:10px;">${filtered.length} من ${state.manageQuestions.length} سؤال</div>
      ${filtered.length ? filtered.map(q => `
        <div class="previewCard">
          <div class="qn">${esc(q.question_text)}</div>
          ${q.options.map((o,j)=>`<div class="op ${j===q.correct_index?'correct':''}">${j===q.correct_index?'✔':'•'} ${esc(o)}</div>`).join("")}
          ${q.explanation ? `<div style="font-size:12px;color:var(--sapphire);margin-top:6px;">💡 ${esc(q.explanation)}</div>` : ""}
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn ghost sm" onclick="startEditQuestionById('${q.id}')">✎ تعديل</button>
            <button class="btn danger sm" onclick="deleteQuestion('${q.id}')">🗑 حذف</button>
          </div>
        </div>`).join("") : `<div class="emptyState">لا توجد أسئلة تطابق البحث.</div>`}
    ` : `<div class="emptyState">اختر قسمًا من الأعلى لعرض أسئلته.</div>`}
  `;
}

function renderAdminExams(){
  const roots = childrenOf(null);
  const builderTitle = examBuilder.id ? "تعديل الامتحان الشامل" : "إنشاء امتحان شامل جديد";
  const groupsList = state.examGroups.length ? `
    <div class="ledger" style="margin-bottom:20px;">
      ${state.examGroups.map(g => {
        const attachName = g.attach_to ? (byId(g.attach_to)?.name || "قسم محذوف") : "الصفحة الرئيسية";
        return `
        <div class="plaque">
          <div>
            <div class="label">${esc(g.title)}</div>
            <div class="meta">يظهر في: ${esc(attachName)} — ${examGroupQuestionCount(g)} سؤال من ${(g.category_ids||[]).length} قسم</div>
          </div>
          <div style="display:flex;gap:4px;">
            <button class="iconBtn" title="تعديل" onclick="loadExamIntoBuilder('${g.id}')">✎</button>
            <button class="iconBtn danger" title="حذف" onclick="deleteExamGroup('${g.id}')">🗑</button>
          </div>
        </div>`;
      }).join("")}
    </div>` : `<div class="emptyState" style="padding:20px 16px;">لا توجد امتحانات شاملة بعد.</div>`;

  return `
    <div style="font-weight:700;font-size:14.5px;margin-bottom:10px;">الامتحانات الشاملة الحالية</div>
    ${groupsList}
    <div class="divider"><span class="gem"></span></div>
    <div style="font-weight:700;font-size:14.5px;margin-bottom:14px;">${builderTitle}</div>
    <div class="field">
      <label>اسم الامتحان الشامل (يظهر للطالب)</label>
      <input type="text" id="examTitle" value="${escAttr(examBuilder.title)}" oninput="examBuilder.title=this.value" placeholder="مثال: امتحان شامل - أنظمة الجسم">
    </div>
    <div class="field">
      <label>أين يظهر زر هذا الامتحان؟</label>
      <select id="examAttachTo" onchange="examBuilder.attachTo=this.value||null">
        <option value="">— الصفحة الرئيسية —</option>
        ${catOptionsHtml(examBuilder.attachTo)}
      </select>
    </div>
    <div class="field">
      <label>اختر الأقسام التي يشملها هذا الامتحان (اختر أي عدد، حتى لو غير مرتبطة ببعضها)</label>
      ${roots.length ? roots.map(r=>renderExamCheckTree(r,0)).join("") : `<div class="emptyState">لا توجد أقسام بعد.</div>`}
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn primary block" onclick="saveExamGroup()">${examBuilder.id ? "حفظ التعديلات" : "إنشاء الامتحان الشامل"}</button>
      ${examBuilder.id ? `<button class="btn ghost sm" onclick="cancelExamBuilder()">إلغاء</button>` : ""}
    </div>
  `;
}


function renderAdmin(){
  return `
    ${renderTopbar(false)}
    <div class="topbar" style="margin-top:-8px;">
      <div class="wordmark" style="font-size:20px;">لوحة الإدارة</div>
      <div style="display:flex;gap:8px;">
        <button class="btn ghost sm" onclick="goHomeRoot()">عرض التطبيق</button>
        <button class="btn danger sm" onclick="adminLogout()">خروج</button>
      </div>
    </div>
    ${renderNoticeBlock()}
    <div class="tabs">
      <button class="tabBtn ${state.adminTab==='tree'?'active':''}" onclick="setAdminTab('tree')">الأقسام</button>
      <button class="tabBtn ${state.adminTab==='add'?'active':''}" onclick="setAdminTab('add')">إضافة أسئلة</button>
      <button class="tabBtn ${state.adminTab==='manage'?'active':''}" onclick="setAdminTab('manage')">إدارة الأسئلة</button>
      <button class="tabBtn ${state.adminTab==='exams'?'active':''}" onclick="setAdminTab('exams')">الامتحانات الشاملة</button>
    </div>
    ${state.adminTab==='tree' ? renderAdminTree() : state.adminTab==='add' ? renderAdminAdd() : state.adminTab==='manage' ? renderAdminManage() : renderAdminExams()}
  `;
}

function renderConnectionError(){
  return `
    ${renderTopbar(false)}
    <div class="notice err">
      تعذّر الاتصال بقاعدة البيانات.<br>
      تأكد من ضبط SUPABASE_URL و SUPABASE_ANON_KEY في أعلى الكود، ومن اتصالك بالإنترنت.<br>
      <span style="opacity:.7;font-size:12px;">${esc(state.notice||"")}</span>
    </div>
    <button class="btn primary" onclick="loadAll(true)">إعادة المحاولة</button>
  `;
}

function render(){
  const app = document.getElementById("app");
  let html = "";
  switch(state.view){
    case "loading": html = `${renderTopbar(false)}<div class="loadingDots">...جارٍ التحميل</div>`; break;
    case "connectionError": html = renderConnectionError(); break;
    case "home": html = renderHome(); break;
    case "quiz": html = renderQuiz(); break;
    case "results": html = renderResults(); break;
    case "review": html = renderReview(); break;
    case "adminLogin": html = renderAdminLogin(); break;
    case "admin": html = renderAdmin(); break;
  }
  app.innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════════
   معالجات أحداث onclick
   ══════════════════════════════════════════════════════════════════ */
window.enterCategory = (id, name) => {
  state.path.push({ id, name });
  state.notice = null;
  render();
};
window.goToCrumb = (i) => {
  state.path = state.path.slice(0, i+1);
  state.notice = null;
  render();
};
window.goHomeRoot = () => {
  state.path = [];
  state.view = "home";
  state.notice = null;
  render();
};
window.startQuiz = startQuiz;
window.answerQuestion = answerQuestion;
window.nextQuestion = nextQuestion;
window.exitQuizToHome = () => {
  state.quiz = null;
  state.view = "home";
  state.resumeAvailable = readProgress(); // لو خرج بمنتصف اختبار، يبقى محفوظًا ويظهر شريط الاستئناف
  render();
};
window.enterReviewMode = () => {
  state.view = "review";
  render();
};
window.exitReviewToResults = () => {
  state.view = "results";
  render();
};
window.goAdmin = async () => {
  const { data } = await sb.auth.getSession();
  if(data.session){
    state.adminSession = data.session;
    state.view = "admin";
  } else {
    state.view = "adminLogin";
  }
  state.notice = null;
  render();
};
window.doAdminLogin = () => {
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  adminLogin(email, pass);
};
window.adminLogout = adminLogout;
window.setAdminTab = (tab) => {
  state.adminTab = tab;
  pendingParsed = [];
  resetExamBuilder();
  questionEditor = null;
  state.manageSelectedCategory = null;
  state.manageQuestions = [];
  state.manageSearch = "";
  render();
};
window.startCustomExam = startCustomExam;
window.loadExamIntoBuilder = loadExamIntoBuilder;
window.toggleExamBuilderCategory = toggleExamBuilderCategory;
window.saveExamGroup = saveExamGroup;
window.deleteExamGroup = deleteExamGroup;
window.loadQuestionsForCategory = loadQuestionsForCategory;
window.startEditQuestionById = startEditQuestionById;
window.cancelEditQuestion = cancelEditQuestion;
window.editorSetOption = editorSetOption;
window.editorAddOption = editorAddOption;
window.editorRemoveOption = editorRemoveOption;
window.editorSetCorrect = editorSetCorrect;
window.saveQuestionEdit = saveQuestionEdit;
window.deleteQuestion = deleteQuestion;
window.cancelExamBuilder = () => { resetExamBuilder(); render(); };

window.addRootCategory = () => {
  const val = document.getElementById("newRootName").value;
  addCategory(null, val);
};
window.promptAddCategory = (parentId) => {
  const name = prompt("اسم القسم الفرعي الجديد:");
  if(name) addCategory(parentId, name);
};
window.promptRenameCategory = (id, current) => {
  const name = prompt("الاسم الجديد:", current);
  if(name) renameCategory(id, name);
};
window.deleteCategory = deleteCategory;
window.moveCategory = moveCategory;
window.toggleTreeExpand = toggleTreeExpand;
window.toggleExamTreeExpand = toggleExamTreeExpand;

window.handleParseClick = () => {
  const fileInput = document.getElementById("fileInput");
  const textArea = document.getElementById("pasteText");
  if(fileInput.files && fileInput.files[0]){
    const reader = new FileReader();
    reader.onload = (e) => runParse(e.target.result);
    reader.readAsText(fileInput.files[0], "UTF-8");
  } else {
    runParse(textArea.value);
  }
};
window.removePendingAt = removePendingAt;
window.handleSaveClick = () => {
  const sel = document.getElementById("targetCategory");
  savePendingQuestions(sel.value || null);
};

/* ══════════════════════════════════════════════════════════════════
   بدء التشغيل
   ══════════════════════════════════════════════════════════════════ */
loadAll();
</script>
